version: 2

project_name: rioctl

before:
  hooks:
    - go mod tidy

builds:
  - id: rioctl
    binary: rioctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - rioctl
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{ .Version }}_
      {{ .Os }}_
      {{ .Arch }}
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: your-org
    name: your-repo

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'